  // ---------- CSV parsing (RFC4180-ish: handles quoted fields with commas/newlines) ----------
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = false; }
        } else field += c;
      } else if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); rows.push(row); row = []; field = "";
      } else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }

    addresses:   ["địa chỉ", "dia chi", "address"],

      let idx = -1;
      for (const alias of ALIASES[key]) {
        const na = normHeader(alias);
        idx = norm.findIndex(h => h === na || h.includes(na));
        if (idx !== -1) break;
      }
      map[key] = idx;
    }
    return map;
  }

  function rowsToRecords(rows) {
    if (rows.length < 2) return [];
    const map = mapHeaders(rows[0]);
    const get = (r, key) => (map[key] >= 0 ? (r[map[key]] || "").trim() : "");
    return rows.slice(1).map(r => ({
      date: get(r, "date"), pickupTime: get(r, "pickupTime"), groupLabel: get(r, "groupLabel"),
      bks: get(r, "bks"), driverName: get(r, "driverName"), phone: get(r, "phone"),
      pointCount: get(r, "pointCount"), paxCount: get(r, "paxCount"), addresses: get(r, "addresses"),
      savedAt: get(r, "savedAt"), routes: get(r, "routes"),
      seats: get(r, "seats"), ticketCodes: get(r, "ticketCodes"),
    })).filter(rec => rec.date || rec.groupLabel);
  }

  // A "Lưu chấm công lên Sheet" click appends one row per group — clicking it more than
  // once for the same day (e.g. after re-clustering) appends again rather than overwriting
  // (the script is append-only by design). Keep only the freshest row per (ngày, nhóm, xe)
  // so the dashboard reflects current state, not every historical save.
  function dedupeRecords(records) {
    const map = new Map();
    for (const r of records) {
      const key = `${r.office}|${r.date}|${r.groupLabel}|${r.bks}`;
      const prev = map.get(key);
      if (!prev || (r.savedAt || "") >= (prev.savedAt || "")) map.set(key, r);
    }
    return [...map.values()];
  }

  const esc = s => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  const telHref = p => "tel:" + String(p || "").replace(/[^\d+]/g, "");

  function phonePill(phone) {
    if (!phone) return "";
    return `<a class="phone-pill" href="${telHref(phone)}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      ${esc(phone)}
    </a>`;
  }

  // ---------- Render ----------
  let allRecords = []; // deduped group rows, each tagged with `office`
  let activeRoute = null; // "" reserved for "chưa gán tuyến" bucket, null = all
  let activeOffice = null; // null = all offices (Hà Nội + Sa Pa combined)
  // The dispatch Sheet is append-only and never trims old days, so without a date filter
  // this picker would just keep growing forever and — since it sorts ascending — bury
  // today's chuyến at the BOTTOM under every previous day. Default to today; "Tất cả các
  // ngày" clears the filter for whoever actually needs to look something up in history.
  let activeDate = todayStr();
  let searchTerm = "";
  let selectedTripKey = null; // which trip is drilled into in the picker/detail view

  const el = id => document.getElementById(id);

  function todayStr() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }
  function dateChipLabel(dateStr) {
    const today = todayStr();
    if (dateStr === today) return "Hôm nay";
    const diffDays = Math.round((new Date(today + "T00:00:00") - new Date(dateStr + "T00:00:00")) / 86400000);
    if (diffDays === 1) return "Hôm qua";
    const parts = dateStr.split("-");
    return parts.length === 3 ? `${parts[2]}/${parts[1]}` : dateStr;
  }

  function routeLabel(code) {
    const parts = String(code || "").split("-");
    return parts.length === 2 ? parts.join(" → ") : "";
  }

  // One group's "Tuyến / Giờ" cell can list several trips it serves, e.g.
  // "HN-SP 07:30; HN-HL 08:00" — split into individual {routeCode, time} entries so the
  // group shows up under every trip it actually picks up for.
  function explodeRoutes(rec) {
    const raw = (rec.routes || "").split(";").map(s => s.trim()).filter(Boolean);
    if (!raw.length) return [{ routeCode: "", time: "" }];
    return raw.map(tok => {
      const m = tok.match(/^(.*?)\s+(\d{1,2}:\d{2})$/);
      return m ? { routeCode: m[1].trim(), time: m[2] } : { routeCode: tok, time: "" };
    });
  }

  function buildTripCards(records) {
    const byTrip = new Map();
    for (const rec of records) {
      for (const { routeCode, time } of explodeRoutes(rec)) {
        const key = `${rec.date}|${routeCode}|${time}`;
        if (!byTrip.has(key)) byTrip.set(key, { key, date: rec.date, routeCode, time, office: rec.office, groups: [] });
        byTrip.get(key).groups.push(rec);
      }
    }
    // Within a single ngày, earliest giờ first (unchanged). Across "Tất cả các ngày" there's
    // no "earliest" that matters — newest day first is what you want when digging through
    // history, so flip the compare instead of showing the oldest chuyến on record first.
    const sorted = [...byTrip.values()].sort((a, b) => (a.date + (a.time || "99:99")).localeCompare(b.date + (b.time || "99:99")));
    return activeDate === null ? sorted.reverse() : sorted;
  }

  function renderTripPickerRow(trip) {
    const totalPax = trip.groups.reduce((s, g) => s + (parseInt(g.paxCount, 10) || 0), 0);
    const isUnrouted = !trip.routeCode;
    const selected = trip.key === selectedTripKey;
    return `<button class="trip-row ${isUnrouted ? "unrouted" : ""}" type="button" aria-pressed="${selected}" data-tripkey="${esc(trip.key)}">
      <span class="trip-row-time num">${esc(trip.time) || "—"}</span>
      <span class="trip-row-main">
        <span class="code">${isUnrouted ? "Chưa gán tuyến" : esc(trip.routeCode)}${trip.office ? ` <span class="office-badge">${esc(trip.office)}</span>` : ""}</span>
        <span class="date">${esc(trip.date)}</span>
      </span>
      <span class="trip-row-stats">
        <span class="n num">${trip.groups.length}</span><span class="k">nhóm</span>
      </span>
      <span class="trip-row-stats">
        <span class="n num">${totalPax}</span><span class="k">khách</span>
      </span>
    </button>`;
  }

  function renderTripCard(trip) {
    const totalPax = trip.groups.reduce((s, g) => s + (parseInt(g.paxCount, 10) || 0), 0);
    const isUnrouted = !trip.routeCode;

    const groupsHtml = trip.groups.map(g => {
      const hasVehicle = g.bks || g.driverName;
      const addrParts = (g.addresses || "").split(";").map(s => s.trim()).filter(Boolean);
      // Newer saves write `seats`/`ticketCodes` as ONE SEGMENT PER PICKUP POINT (same order
      // as `addresses`, split on ";") so each address can show only its own ghế/vé. Older
      // rows saved before this existed have a single flat comma-list with no ";" — segment
      // count won't match addrParts.length, so fall back to one undifferentiated block below
      // the list instead of mispairing ghế/vé to the wrong address.
      const seatSegs = (g.seats || "").split(";").map(s => s.trim());
      const ticketSegs = (g.ticketCodes || "").split(";").map(s => s.trim());
      const perPointAligned = seatSegs.length === addrParts.length && ticketSegs.length === addrParts.length;
      // Legacy fallback only (pre-grouping saves) — dedupes a flat comma-list so a repeated
      // mã vé at least doesn't show twice, even without knowing which ghế go with which vé.
      const chipList = (s, cls) => [...new Set(s.split(",").map(v => v.trim()).filter(Boolean))].map(v => `<span class="${cls} num">${esc(v)}</span>`).join("");
      // Current saves group by BOOKING within each điểm đón: seat/ticket segments are split
      // on "|" into one sub-group per mã vé (e.g. "A11,B11|B25" + "56XZXW|BGW8W3" — a 2-ghế
      // vé and a 1-ghế vé at the same address), so a vé covering several ghế shows ONCE with
      // all its ghế attached, instead of once per ghế or as 2 unpaired flat lists.
      const renderTicketGroups = (seatSeg, ticketSeg) => {
        const seatGroups = (seatSeg || "").split("|");
        const codeGroups = (ticketSeg || "").split("|");
        const n = Math.max(seatGroups.length, codeGroups.length);
        let html = "";
        for (let j = 0; j < n; j++) {
          const code = (codeGroups[j] || "").trim();
          const seatsForCode = (seatGroups[j] || "").split(",").map(s => s.trim()).filter(Boolean);
          if (!code && !seatsForCode.length) continue;
          const codeHtml = code ? `<span class="ticket-chip num">${esc(code)}</span>` : "";
          const seatsHtml = seatsForCode.map(s => `<span class="seat-chip num">${esc(s)}</span>`).join("");
          html += `<span class="ticket-group">${codeHtml}${seatsHtml}</span>`;
        }
        return html;
      };
      // One shuttle run can feed passengers onward to more than one departure — if so,
      // this exact group (same driver/xe/khách/địa chỉ) also appears under those other
      // trip cards. Flag it explicitly so that isn't mistaken for duplicated/wrong data.
      const otherTrips = explodeRoutes(g).filter(e => !(e.routeCode === trip.routeCode && e.time === trip.time));
      return `<div class="group-block ${hasVehicle ? "" : "no-driver"}">
        <div class="driver-bar">
          <span class="name">${g.driverName ? esc(g.driverName) : "Chưa gán tài xế"}</span>
          ${g.bks ? `<span class="plate num">${esc(g.bks)}</span>` : ""}
          ${phonePill(g.phone)}
          <span class="group-label">${esc(g.groupLabel || "")}</span>
        </div>
        <div class="group-meta">
          ${g.pickupTime ? `<span class="stat-tag">Giờ đón <b class="num">${esc(g.pickupTime)}</b></span>` : ""}
          <span class="stat-tag"><b class="num">${esc(g.pointCount) || 0}</b> điểm đón</span>
          <span class="stat-tag"><b class="num">${esc(g.paxCount) || 0}</b> khách</span>
        </div>
        ${addrParts.length ? `<ul class="addr-list">${addrParts.map((a, i) => {
          const groupsHtml = perPointAligned ? renderTicketGroups(seatSegs[i], ticketSegs[i]) : "";
          return `<li><div class="addr-text">${esc(a)}</div>${groupsHtml ? `<div class="addr-tickets">${groupsHtml}</div>` : ""}</li>`;
        }).join("")}</ul>` : ""}
        ${!perPointAligned && g.seats ? `<div class="ticket-line"><span class="ticket-line-k">Số ghế</span> ${chipList(g.seats, "seat-chip")}</div>` : ""}
        ${!perPointAligned && g.ticketCodes ? `<div class="ticket-line"><span class="ticket-line-k">Mã vé</span> ${chipList(g.ticketCodes, "ticket-chip")}</div>` : ""}
        ${otherTrips.length ? `<div class="shared-note">Xe này gộp đón cho cả chuyến khác: ${otherTrips.map(e => `<b>${esc(e.routeCode)}${e.time ? " · " + esc(e.time) : ""}</b>`).join(", ")} — số khách/địa chỉ trên là tổng gộp, không riêng cho từng chuyến.</div>` : ""}
        ${g.savedAt ? `<div class="saved-at">Lưu lúc ${esc(g.savedAt)}</div>` : ""}
      </div>`;
    }).join("");

    return `<div class="trip-card ${isUnrouted ? "unrouted" : ""}" data-route="${esc(trip.routeCode)}">
      <div class="trip-head">
        <div class="trip-time num">${esc(trip.time) || "—"}</div>
        <div class="trip-route">
          <span class="code">${isUnrouted ? "Chưa gán tuyến" : esc(trip.routeCode)} ${trip.office ? `<span class="office-badge">${esc(trip.office)}</span>` : ""}</span>
          <span class="cities">${isUnrouted ? esc(trip.date) : `${routeLabel(trip.routeCode)} · ${esc(trip.date)}`}</span>
        </div>
        <div class="trip-meta">
          <div class="meta-item"><span class="v">${trip.groups.length}</span><span class="k">Nhóm / xe</span></div>
          <div class="meta-item"><span class="v">${totalPax}</span><span class="k">Khách</span></div>
        </div>
      </div>
      <div class="trip-body">${groupsHtml}</div>
    </div>`;
  }

  function applyFilters(records) {
    let out = records;
    if (activeDate !== null) out = out.filter(r => r.date === activeDate);
    if (activeOffice !== null) out = out.filter(r => r.office === activeOffice);
    if (activeRoute !== null) {
      out = out.filter(r => explodeRoutes(r).some(e => e.routeCode === activeRoute));
    }
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      out = out.filter(r =>
        (r.driverName || "").toLowerCase().includes(q) ||
        (r.bks || "").toLowerCase().includes(q) ||
        (r.phone || "").includes(q) ||
        (r.addresses || "").toLowerCase().includes(q) ||
        (r.ticketCodes || "").toLowerCase().includes(q)
      );
    }
    return out;
  }

  function render() {
    const filtered = applyFilters(allRecords);
    const trips = buildTripCards(filtered);
    const pickerLayout = el("pickerLayout");
    const emptyState = el("emptyState");

    if (!allRecords.length) {
      emptyState.hidden = false;
      pickerLayout.hidden = true;
      el("summaryStrip").hidden = true;
      return;
    }
    emptyState.hidden = true;
    pickerLayout.hidden = false;

    const picker = el("tripPicker");
    const emptyMsg = activeDate !== null && allRecords.some(r => r.date && r.date !== activeDate)
      ? `Chưa có chuyến nào lưu cho ngày ${esc(dateChipLabel(activeDate))}. Chọn ngày khác ở ô lịch để xem dữ liệu.`
      : "Không tìm thấy chuyến nào khớp bộ lọc.";
    picker.innerHTML = trips.length
      ? trips.map(renderTripPickerRow).join("")
      : `<div class="empty" style="padding:28px 16px;"><p style="margin:0;">${emptyMsg}</p></div>`;
    picker.querySelectorAll(".trip-row").forEach(btn => btn.addEventListener("click", () => {
      selectedTripKey = selectedTripKey === btn.dataset.tripkey ? null : btn.dataset.tripkey;
      render();
    }));

    // Selected trip might have dropped out of the filtered set (search/filter changed, or
    // its data disappeared on refresh) — fall back to the placeholder rather than showing
    // stale detail for a trip no longer in view.
    const selectedTrip = trips.find(t => t.key === selectedTripKey);
    el("tripDetail").innerHTML = selectedTrip
      ? renderTripCard(selectedTrip)
      : `<div class="detail-placeholder" id="detailPlaceholder">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5"><path d="M9 18l6-6-6-6"/></svg>
          <p>Chọn 1 chuyến bên trái (giờ · tuyến) để xem chi tiết xe, tài xế, điểm đón.</p>
        </div>`;

    // Was summing allRecords (every day ever saved) while trips.length above already
    // respects the active filters — harmless before there was no date filter to mismatch
    // against, but now that "Hôm nay" is the default this would silently count every
    // historical day into "Tổng khách" too. Use the same filtered set everywhere on this strip.
    const totalPax = filtered.reduce((s, r) => s + (parseInt(r.paxCount, 10) || 0), 0);
    const noVehicle = filtered.filter(r => !r.bks && !r.driverName).length;
    const strip = el("summaryStrip");
    strip.hidden = false;
    strip.innerHTML = [
      [trips.length, "Chuyến"],
      [filtered.length, "Nhóm / xe"],
      [totalPax, "Tổng khách"],
      [noVehicle, "Chưa gán xe"],
    ].map(([n, lbl]) => `<div class="summary-cell"><div class="n num">${n}</div><div class="lbl">${lbl}</div></div>`).join("");
  }

  // A chip-per-ngày row was fine at first but only grows — every day the Sheet ever sees
  // adds another chip forever, and it gets unreadable within a couple weeks. A calendar
  // picker (same control the extension itself uses to pick ngày) scales to any amount of
  // history without cluttering the filter row; "Hôm nay" / "Tất cả các ngày" cover the two
  // most common jumps as one-click shortcuts alongside it.
  function syncDateControls() {
    const input = el("dateInput");
    if (activeDate !== null) input.value = activeDate;
    el("dateTodayChip").setAttribute("aria-pressed", String(activeDate === todayStr()));
  }

  function rebuildOfficeChips() {
    const offices = [...new Set(allRecords.map(r => r.office).filter(Boolean))].sort();
    const box = el("officeSelect");
    if (offices.length < 2) { box.hidden = true; return; } // only one office loaded — nothing to filter
    let html = `<option value="__all__">Tất cả khu vực</option>`;
    html += offices.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
    box.innerHTML = html;
    box.value = activeOffice === null ? "__all__" : activeOffice;
    box.classList.toggle("is-active", activeOffice !== null);
    box.hidden = false;
    box.onchange = () => {
      activeOffice = box.value === "__all__" ? null : box.value;
      rebuildOfficeChips();
      render();
    };
  }

  function rebuildRouteChips() {
    const codes = new Set();
    let hasUnrouted = false;
    for (const r of allRecords) {
      for (const { routeCode } of explodeRoutes(r)) {
        if (routeCode) codes.add(routeCode); else hasUnrouted = true;
      }
    }
    const routes = [...codes].sort();
    const box = el("routeSelect");
    if (!routes.length && !hasUnrouted) { box.hidden = true; return; }
    let html = `<option value="__all__">Tất cả tuyến</option>`;
    html += routes.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("");
    if (hasUnrouted) html += `<option value="">Chưa gán tuyến</option>`;
    box.innerHTML = html;
    box.value = activeRoute === null ? "__all__" : activeRoute;
    box.classList.toggle("is-active", activeRoute !== null);
    box.hidden = false;
    box.onchange = () => {
      activeRoute = box.value === "__all__" ? null : box.value;
      rebuildRouteChips();
      render();
    };
  }

  function loadRecords(rawRecords, sourceLabel) {
    allRecords = dedupeRecords(rawRecords);
    syncDateControls();
    rebuildOfficeChips();
    rebuildRouteChips();
    render();
    el("updatedFoot").textContent = `Cập nhật lúc ${new Date().toLocaleString("vi-VN")}${sourceLabel ? " · " + sourceLabel : ""}`;
  }

  function setStatus(msg, kind) {
    const s = el("statusLine");
    s.textContent = msg || "";
    s.className = "status-line" + (kind ? " " + kind : "");
  }

  // Hardcoded shortcuts to the 2 published "Chấm công {office}" CSV endpoints — this is
  // deliberately the ONLY data source (no file upload, no manual URL field) so booking
  // can't point the dashboard at an arbitrary/wrong source. Both load together into one
  // combined view (tagged per-record with `office`) instead of picking one at a time —
  // "Tất cả khu vực"/"Hà Nội"/"Sa Pa" chips below just filter what's already loaded.
  const SOURCES = [
    { label: "Hà Nội", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWPdOH0zyaDui2ojqiKglSFh11SFmjXB7bgLuq_iBFgIVfCYo_E623t5gCOWvRI8XJZkptUXfC4kdM/pub?gid=1506329944&single=true&output=csv" },
    { label: "Sa Pa", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbQCxhQENuXOifuaYTkhL3R7fZBYgCKz_YvzCgjr4CBIZe1TDhXtSyQHGMY5Ipp7nea921lUetGeLF/pub?gid=2032547328&single=true&output=csv" },
  ];

  let autoTimer = null;
  let autoInFlight = false;
  const AUTO_REFRESH_MS = 30000;

  // `background` = true for auto-refresh polls: on total failure, keep whatever is already
  // on screen instead of blanking the dashboard out from under whoever's looking at it —
  // just leave a quiet error note in the status line. A partial failure (one office loads,
  // the other doesn't) still shows the office that succeeded, with the failure noted.
  async function loadAllSources(background) {
    if (autoInFlight) return;
    autoInFlight = true;
    if (!background) setStatus("Đang tải…");
    try {
      const results = await Promise.allSettled(SOURCES.map(src =>
        fetch(src.url, { cache: "no-store" }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        }).then(text => rowsToRecords(parseCSV(text)).map(rec => ({ ...rec, office: src.label })))
      ));

      const merged = [];
      const errors = [];
      results.forEach((res, i) => {
        if (res.status === "fulfilled") merged.push(...res.value);
        else errors.push(`${SOURCES[i].label}: ${res.reason.message || res.reason}`);
      });

      if (!merged.length) {
        setStatus((background ? "Tự động cập nhật lỗi (vẫn giữ bảng cũ): " : "Không tải được dữ liệu: ") + (errors.join("; ") || "không có dòng nào"), "err");
        return;
      }

      loadRecords(merged, "Hà Nội & Sa Pa");
      const okMsg = `Đã tải ${merged.length} dòng (${allRecords.length} nhóm sau khi gộp trùng).`;
      setStatus(errors.length ? `${okMsg} Lỗi: ${errors.join("; ")}` : okMsg, errors.length ? "err" : "ok");
      el("autoRefreshWrap").hidden = false;
      if (!autoTimer) startAutoRefresh();
    } finally {
      autoInFlight = false;
    }
  }

  function updateLiveDot() {
    el("liveDot").classList.toggle("live", !!autoTimer);
  }

  function stopAutoRefresh() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    updateLiveDot();
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    if (!el("autoRefreshToggle").checked) { updateLiveDot(); return; }
    autoTimer = setInterval(() => { if (!document.hidden) loadAllSources(true); }, AUTO_REFRESH_MS);
    updateLiveDot();
  }

  // ---------- Wiring ----------
  el("btnRefresh").addEventListener("click", () => loadAllSources());
  el("autoRefreshToggle").addEventListener("change", () => { if (el("autoRefreshToggle").checked) startAutoRefresh(); else stopAutoRefresh(); });
  // Coming back to the tab after it was backgrounded: catch up immediately instead of
  // waiting out the rest of the interval, since the last poll(s) were skipped while hidden.
  document.addEventListener("visibilitychange", () => { if (!document.hidden && autoTimer) loadAllSources(true); });

  el("searchInput").addEventListener("input", e => { searchTerm = e.target.value.trim(); render(); });

  el("dateInput").addEventListener("change", e => {
    activeDate = e.target.value || todayStr(); // cleared the field → fall back to today, not "mọi ngày"
    syncDateControls();
    render();
  });
  el("dateTodayChip").addEventListener("click", () => { activeDate = todayStr(); syncDateControls(); render(); });

  syncDateControls(); // seed the <input type="date"> with today before any data has loaded
  loadAllSources(); // auto-load both offices on open — no manual "chọn khu vực" step
  render();
})();
</script>
