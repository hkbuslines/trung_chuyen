<meta charset="utf-8" />
<title>Bảng Điều Phối Trung Chuyển — HK Buslines</title>
<style>
  :root {
    --ink: #16211a;
    --ink-soft: #4b5a4c;
    --paper: #f5f6f1;
    --paper-raised: #ffffff;
    --line: #dde1d6;
    --line-strong: #c4cabb;
    --accent: #1b5e3f;
    --accent-ink: #ffffff;
    --accent-soft: #e4efe6;
    --accent-soft-line: #bfd8c8;
    --amber: #8a5a12;
    --amber-soft: #f4e6cd;
    --amber-soft-line: #e0c48f;
    --red: #9c3226;
    --red-soft: #f6e0dc;
    --red-soft-line: #e3b3a9;
    --blue: #2f4d6b;
    --blue-soft: #dfe7ee;
    --blue-soft-line: #b7c6d6;
    --shadow: 0 1px 2px rgba(22,33,26,.06), 0 8px 24px -12px rgba(22,33,26,.18);
    --radius: 10px;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e9ede4;
      --ink-soft: #a9b6a9;
      --paper: #10140e;
      --paper-raised: #171d15;
      --line: #2a3226;
      --line-strong: #3a4534;
      --accent: #55b382;
      --accent-ink: #0c150f;
      --accent-soft: #1a2b20;
      --accent-soft-line: #2e4a37;
      --amber: #e0b062;
      --amber-soft: #2c2415;
      --amber-soft-line: #4a3c1f;
      --red: #e2897a;
      --red-soft: #2c1a17;
      --red-soft-line: #4a2b25;
      --blue: #9db6d1;
      --blue-soft: #182531;
      --blue-soft-line: #2b3f52;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.5);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --ink: #e9ede4; --ink-soft: #a9b6a9; --paper: #10140e; --paper-raised: #171d15;
    --line: #2a3226; --line-strong: #3a4534; --accent: #55b382; --accent-ink: #0c150f;
    --accent-soft: #1a2b20; --accent-soft-line: #2e4a37; --amber: #e0b062; --amber-soft: #2c2415;
    --amber-soft-line: #4a3c1f; --red: #e2897a; --red-soft: #2c1a17; --red-soft-line: #4a2b25;
    --blue: #9db6d1; --blue-soft: #182531; --blue-soft-line: #2b3f52;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --ink: #16211a; --ink-soft: #4b5a4c; --paper: #f5f6f1; --paper-raised: #ffffff;
    --line: #dde1d6; --line-strong: #c4cabb; --accent: #1b5e3f; --accent-ink: #ffffff;
    --accent-soft: #e4efe6; --accent-soft-line: #bfd8c8; --amber: #8a5a12; --amber-soft: #f4e6cd;
    --amber-soft-line: #e0c48f; --red: #9c3226; --red-soft: #f6e0dc; --red-soft-line: #e3b3a9;
    --blue: #2f4d6b; --blue-soft: #dfe7ee; --blue-soft-line: #b7c6d6;
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .num, .plate, .phone-pill {
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
  }
  a { color: inherit; }
  button { font: inherit; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1180px; margin: 0 auto; padding: 16px 20px 14px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .brand-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .mark {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--accent); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; letter-spacing: -.02em;
    flex-shrink: 0;
  }
  .brand-text h1 {
    margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -.01em;
    text-wrap: balance;
  }
  .brand-text .sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 1px; }

  .source-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    border: 1px solid var(--line-strong); background: var(--paper-raised); color: var(--ink);
    border-radius: 7px; padding: 6px 12px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: background .15s ease, border-color .15s ease;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
  .btn-ghost:hover { color: var(--ink); }
  .auto-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; white-space: nowrap; padding: 6px 4px;
  }
  .auto-toggle[hidden] { display: none; }
  .auto-toggle input { accent-color: var(--accent); cursor: pointer; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); flex-shrink: 0; }
  .live-dot.live { background: var(--accent); animation: livepulse 1.8s ease-in-out infinite; }
  @keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
  @media (prefers-reduced-motion: reduce) { .live-dot.live { animation: none; } }
  .status-line { font-size: 11.5px; color: var(--ink-soft); }
  .status-line.err { color: var(--red); }
  .status-line.ok { color: var(--accent); }

  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .search-field {
    display: flex; align-items: center; gap: 8px;
    background: var(--paper-raised); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 7px 12px;
    flex: 1; min-width: 200px; max-width: 340px;
  }
  .search-field input { border: none; outline: none; background: transparent; color: var(--ink); font-size: 13px; flex: 1; min-width: 0; }
  .search-field input::placeholder { color: var(--ink-soft); }
  .chip-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: thin; }
  .chip {
    flex-shrink: 0;
    border: 1px solid var(--line-strong); background: var(--paper-raised); color: var(--ink-soft);
    border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: .01em;
  }
  .chip[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent-soft-line); color: var(--accent); }

  .office-badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 2px 7px; border-radius: 999px; white-space: nowrap;
    background: var(--blue-soft); color: var(--blue); border: 1px solid var(--blue-soft-line);
  }

  /* ── Main ── */
  main { max-width: 1180px; margin: 0 auto; padding: 22px 20px 64px; }

  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; background: var(--line);
    border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;
    margin-bottom: 22px;
  }
  .summary-cell { background: var(--paper-raised); padding: 12px 16px; }
  .summary-cell .n { font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
  .summary-cell .lbl { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin-top: 2px; }

  .empty {
    border: 1px dashed var(--line-strong); border-radius: 14px;
    padding: 56px 24px; text-align: center; color: var(--ink-soft);
  }
  .empty h2 { color: var(--ink); font-size: 17px; margin: 14px 0 6px; text-wrap: balance; }
  .empty p { font-size: 13.5px; max-width: 460px; margin: 0 auto 4px; }

  /* ── Picker (left rail: pick a trip) + Detail (right: that trip's groups) ── */
  .picker-layout { display: grid; grid-template-columns: 300px 1fr; gap: 18px; align-items: start; }
  @media (max-width: 780px) { .picker-layout { grid-template-columns: 1fr; } }

  .trip-picker {
    display: flex; flex-direction: column; gap: 4px;
    background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px;
    padding: 8px; box-shadow: var(--shadow);
    max-height: 74vh; overflow-y: auto;
  }
  @media (max-width: 780px) { .trip-picker { max-height: 46vh; } }

  .trip-row {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 10px; border-radius: 8px; border: 1px solid transparent;
    background: transparent; cursor: pointer; text-align: left; font: inherit; color: var(--ink);
  }
  .trip-row:hover { background: var(--paper); }
  .trip-row[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent-soft-line); }
  .trip-row.unrouted[aria-pressed="true"] { background: var(--amber-soft); border-color: var(--amber-soft-line); }
  .trip-row-time { font-weight: 800; font-size: 15px; min-width: 44px; flex-shrink: 0; }
  .trip-row-main { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .trip-row-main .code { font-weight: 700; font-size: 12.5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .trip-row-main .date { font-size: 10.5px; color: var(--ink-soft); }
  .trip-row-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
  .trip-row-stats .n { font-weight: 700; font-size: 12.5px; }
  .trip-row-stats .k { font-size: 9px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em; }

  .detail-placeholder {
    border: 1px dashed var(--line-strong); border-radius: 14px;
    padding: 48px 24px; text-align: center; color: var(--ink-soft);
  }
  .detail-placeholder p { font-size: 13.5px; max-width: 320px; margin: 10px auto 0; }

  .trip-card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .trip-head {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--accent-soft), transparent 130%);
  }
  .trip-card.unrouted .trip-head { background: linear-gradient(180deg, var(--amber-soft), transparent 130%); }
  .trip-time { font-size: 26px; font-weight: 800; letter-spacing: -.02em; line-height: 1; min-width: 64px; }
  .trip-route { display: flex; flex-direction: column; gap: 1px; }
  .trip-route .code { font-weight: 800; font-size: 13.5px; letter-spacing: .01em; }
  .trip-route .cities { font-size: 12px; color: var(--ink-soft); }
  .trip-meta { display: flex; align-items: center; gap: 14px; margin-left: auto; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .meta-item .v { font-weight: 700; font-size: 13px; }
  .meta-item .k { font-size: 10.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; }

  .trip-body { padding: 4px 0; }
  .group-block { padding: 12px 18px; }
  .group-block + .group-block { border-top: 1px solid var(--line); }

  .driver-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 6px 10px; margin-bottom: 8px;
    background: var(--accent-soft); border: 1px solid var(--accent-soft-line);
    border-radius: 7px;
  }
  .driver-bar .name { font-weight: 700; font-size: 12.5px; color: var(--accent); }
  .driver-bar .plate { font-size: 11.5px; color: var(--ink-soft); background: var(--paper-raised); border: 1px solid var(--line-strong); padding: 2px 7px; border-radius: 5px; }
  .driver-bar .group-label { font-size: 11px; font-weight: 700; color: var(--ink-soft); margin-left: auto; }
  .driver-bar a.phone-pill { flex-shrink: 0; }

  .group-block.no-driver .driver-bar { background: var(--amber-soft); border-color: var(--amber-soft-line); }
  .group-block.no-driver .driver-bar .name { color: var(--amber); }

  .group-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .stat-tag {
    font-size: 11.5px; font-weight: 600; color: var(--ink-soft);
    background: var(--paper); border: 1px solid var(--line); border-radius: 999px;
    padding: 3px 10px;
  }
  .stat-tag b { color: var(--ink); font-weight: 700; }

  .addr-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .addr-list li {
    font-size: 12.5px; color: var(--ink-soft); padding-left: 14px; position: relative;
  }
  .addr-list li::before { content: "•"; position: absolute; left: 2px; color: var(--line-strong); }
  .addr-list .addr-text { line-height: 1.4; }
  .addr-tickets { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: 3px; }

  .phone-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; text-decoration: none;
    color: var(--ink); background: var(--paper); border: 1px solid var(--line-strong);
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .phone-pill:hover { border-color: var(--accent); color: var(--accent); }
  .phone-pill svg { flex-shrink: 0; }

  .ticket-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; font-size: 11.5px; }
  .ticket-line-k { color: var(--ink-soft); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: .05em; flex-shrink: 0; }
  .seat-chip {
    font-size: 11px; font-weight: 700; color: var(--blue); background: var(--blue-soft);
    border: 1px solid var(--blue-soft-line); border-radius: 5px; padding: 1px 7px;
  }
  .ticket-chip {
    font-size: 11px; font-weight: 700; color: var(--amber); background: var(--amber-soft);
    border: 1px solid var(--amber-soft-line); border-radius: 5px; padding: 1px 7px;
  }

  .shared-note {
    font-size: 11.5px; color: var(--blue); background: var(--blue-soft); border: 1px solid var(--blue-soft-line);
    border-radius: 7px; padding: 6px 10px; margin-top: 8px; line-height: 1.4;
  }
  .shared-note b { font-weight: 700; }
  .saved-at { font-size: 10.5px; color: var(--ink-soft); margin-top: 8px; opacity: .8; }

  .updated-foot { margin-top: 22px; font-size: 11.5px; color: var(--ink-soft); text-align: center; }

  @media (max-width: 620px) {
    .trip-meta { margin-left: 0; width: 100%; justify-content: space-between; }
  }
</style>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-row">

        <div class="brand-text">

  <div class="summary-strip" id="summaryStrip" hidden></div>

      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>

<script>
(function () {
  "use strict";

  // ---------- CSV parsing (RFC4180-ish: handles quoted fields with commas/newlines) ----------
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = false; }
        } else field += c;
      } else if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); rows.push(row); row = []; field = "";
      } else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(v => v.trim() !== ""));
  }

  // ---------- Flexible header matching — matches the "Chấm công {office}" tab schema
  // written by google_apps_script_cham_cong_trung_chuyen.txt (group-level, no passenger
  // names/phones — only xe/tài xế/địa chỉ gộp/tuyến+giờ ở mức nhóm). ----------
  const ALIASES = {
    date:        ["ngày", "ngay", "date"],
    pickupTime:  ["giờ đón", "gio don"],
    groupLabel:  ["nhóm", "nhom"],
    bks:         ["xe (bks)", "xe bks", "bks"],
    driverName:  ["tài xế", "tai xe", "driver"],
    phone:       ["sđt", "sdt", "phone"],
    pointCount:  ["số điểm đón", "so diem don"],
    paxCount:    ["tổng số khách", "tong so khach"],
    addresses:   ["địa chỉ", "dia chi", "address"],
    savedAt:     ["lúc lưu", "luc luu"],
    routes:      ["tuyến / giờ", "tuyen / gio", "tuyến/giờ", "tuyen/gio", "tuyến", "tuyen"],
    seats:       ["số ghế", "so ghe", "ghế", "ghe", "seat"],
    ticketCodes: ["mã vé", "ma ve", "mã đặt chỗ", "ma dat cho", "booking"],
  };
  function normHeader(h) {
    return h.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/đ/g, "d").trim();
  }
  function mapHeaders(headerRow) {
    const norm = headerRow.map(normHeader);
    const map = {};
    for (const key in ALIASES) {
      let idx = -1;
      for (const alias of ALIASES[key]) {
        const na = normHeader(alias);
        idx = norm.findIndex(h => h === na || h.includes(na));
        if (idx !== -1) break;
      }
      map[key] = idx;
    }
    return map;
  }

  function rowsToRecords(rows) {
    if (rows.length < 2) return [];
    const map = mapHeaders(rows[0]);
    const get = (r, key) => (map[key] >= 0 ? (r[map[key]] || "").trim() : "");
    return rows.slice(1).map(r => ({
      date: get(r, "date"), pickupTime: get(r, "pickupTime"), groupLabel: get(r, "groupLabel"),
      bks: get(r, "bks"), driverName: get(r, "driverName"), phone: get(r, "phone"),
      pointCount: get(r, "pointCount"), paxCount: get(r, "paxCount"), addresses: get(r, "addresses"),
      savedAt: get(r, "savedAt"), routes: get(r, "routes"),
      seats: get(r, "seats"), ticketCodes: get(r, "ticketCodes"),
    })).filter(rec => rec.date || rec.groupLabel);
  }

  // A "Lưu chấm công lên Sheet" click appends one row per group — clicking it more than
  // once for the same day (e.g. after re-clustering) appends again rather than overwriting
  // (the script is append-only by design). Keep only the freshest row per (ngày, nhóm, xe)
  // so the dashboard reflects current state, not every historical save.
  function dedupeRecords(records) {
    const map = new Map();
    for (const r of records) {
      const key = `${r.office}|${r.date}|${r.groupLabel}|${r.bks}`;
      const prev = map.get(key);
      if (!prev || (r.savedAt || "") >= (prev.savedAt || "")) map.set(key, r);
    }
    return [...map.values()];
  }

  const esc = s => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  const telHref = p => "tel:" + String(p || "").replace(/[^\d+]/g, "");

  function phonePill(phone) {
    if (!phone) return "";
    return `<a class="phone-pill" href="${telHref(phone)}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      ${esc(phone)}
    </a>`;
  }

  // ---------- Render ----------
  let allRecords = []; // deduped group rows, each tagged with `office`
  let activeRoute = null; // "" reserved for "chưa gán tuyến" bucket, null = all
  let activeOffice = null; // null = all offices (Hà Nội + Sa Pa combined)
  let searchTerm = "";
  let selectedTripKey = null; // which trip is drilled into in the picker/detail view

  const el = id => document.getElementById(id);

  function routeLabel(code) {
    const parts = String(code || "").split("-");
    return parts.length === 2 ? parts.join(" → ") : "";
  }

  // One group's "Tuyến / Giờ" cell can list several trips it serves, e.g.
  // "HN-SP 07:30; HN-HL 08:00" — split into individual {routeCode, time} entries so the
  // group shows up under every trip it actually picks up for.
  function explodeRoutes(rec) {
    const raw = (rec.routes || "").split(";").map(s => s.trim()).filter(Boolean);
    if (!raw.length) return [{ routeCode: "", time: "" }];
    return raw.map(tok => {
      const m = tok.match(/^(.*?)\s+(\d{1,2}:\d{2})$/);
      return m ? { routeCode: m[1].trim(), time: m[2] } : { routeCode: tok, time: "" };
    });
  }

  function buildTripCards(records) {
    const byTrip = new Map();
    for (const rec of records) {
      for (const { routeCode, time } of explodeRoutes(rec)) {
        const key = `${rec.date}|${routeCode}|${time}`;
        if (!byTrip.has(key)) byTrip.set(key, { key, date: rec.date, routeCode, time, office: rec.office, groups: [] });
        byTrip.get(key).groups.push(rec);
      }
    }
    return [...byTrip.values()].sort((a, b) => (a.date + (a.time || "99:99")).localeCompare(b.date + (b.time || "99:99")));
  }

  function renderTripPickerRow(trip) {
    const totalPax = trip.groups.reduce((s, g) => s + (parseInt(g.paxCount, 10) || 0), 0);
    const isUnrouted = !trip.routeCode;
    const selected = trip.key === selectedTripKey;
    return `<button class="trip-row ${isUnrouted ? "unrouted" : ""}" type="button" aria-pressed="${selected}" data-tripkey="${esc(trip.key)}">
      <span class="trip-row-time num">${esc(trip.time) || "—"}</span>
      <span class="trip-row-main">
        <span class="code">${isUnrouted ? "Chưa gán tuyến" : esc(trip.routeCode)}${trip.office ? ` <span class="office-badge">${esc(trip.office)}</span>` : ""}</span>
        <span class="date">${esc(trip.date)}</span>
      </span>
      <span class="trip-row-stats">
        <span class="n num">${trip.groups.length}</span><span class="k">nhóm</span>
      </span>
      <span class="trip-row-stats">
        <span class="n num">${totalPax}</span><span class="k">khách</span>
      </span>
    </button>`;
  }

  function renderTripCard(trip) {
    const totalPax = trip.groups.reduce((s, g) => s + (parseInt(g.paxCount, 10) || 0), 0);
    const isUnrouted = !trip.routeCode;

    const groupsHtml = trip.groups.map(g => {
      const hasVehicle = g.bks || g.driverName;
      const addrParts = (g.addresses || "").split(";").map(s => s.trim()).filter(Boolean);
      // Newer saves write `seats`/`ticketCodes` as ONE SEGMENT PER PICKUP POINT (same order
      // as `addresses`, split on ";") so each address can show only its own ghế/vé. Older
      // rows saved before this existed have a single flat comma-list with no ";" — segment
      // count won't match addrParts.length, so fall back to one undifferentiated block below
      // the list instead of mispairing ghế/vé to the wrong address.
      const seatSegs = (g.seats || "").split(";").map(s => s.trim());
      const ticketSegs = (g.ticketCodes || "").split(";").map(s => s.trim());
      const perPointAligned = seatSegs.length === addrParts.length && ticketSegs.length === addrParts.length;
      // A booking/vé can cover several seats — same mã vé repeats once per ghế in the raw
      // data (e.g. "2UU83V" x9). Dedupe so each mã vé only shows once in the chip list.
      const chipList = (s, cls) => [...new Set(s.split(",").map(v => v.trim()).filter(Boolean))].map(v => `<span class="${cls} num">${esc(v)}</span>`).join("");
      // One shuttle run can feed passengers onward to more than one departure — if so,
      // this exact group (same driver/xe/khách/địa chỉ) also appears under those other
      // trip cards. Flag it explicitly so that isn't mistaken for duplicated/wrong data.
      const otherTrips = explodeRoutes(g).filter(e => !(e.routeCode === trip.routeCode && e.time === trip.time));
      return `<div class="group-block ${hasVehicle ? "" : "no-driver"}">
        <div class="driver-bar">
          <span class="name">${g.driverName ? esc(g.driverName) : "Chưa gán tài xế"}</span>
          ${g.bks ? `<span class="plate num">${esc(g.bks)}</span>` : ""}
          ${phonePill(g.phone)}
          <span class="group-label">${esc(g.groupLabel || "")}</span>
        </div>
        <div class="group-meta">
          ${g.pickupTime ? `<span class="stat-tag">Giờ đón <b class="num">${esc(g.pickupTime)}</b></span>` : ""}
          <span class="stat-tag"><b class="num">${esc(g.pointCount) || 0}</b> điểm đón</span>
          <span class="stat-tag"><b class="num">${esc(g.paxCount) || 0}</b> khách</span>
        </div>
        ${addrParts.length ? `<ul class="addr-list">${addrParts.map((a, i) => {
          const seatsHtml = perPointAligned ? chipList(seatSegs[i] || "", "seat-chip") : "";
          const ticketsHtml = perPointAligned ? chipList(ticketSegs[i] || "", "ticket-chip") : "";
          return `<li><div class="addr-text">${esc(a)}</div>${seatsHtml || ticketsHtml ? `<div class="addr-tickets">${seatsHtml}${ticketsHtml}</div>` : ""}</li>`;
        }).join("")}</ul>` : ""}
        ${!perPointAligned && g.seats ? `<div class="ticket-line"><span class="ticket-line-k">Số ghế</span> ${chipList(g.seats, "seat-chip")}</div>` : ""}
        ${!perPointAligned && g.ticketCodes ? `<div class="ticket-line"><span class="ticket-line-k">Mã vé</span> ${chipList(g.ticketCodes, "ticket-chip")}</div>` : ""}
        ${otherTrips.length ? `<div class="shared-note">Xe này gộp đón cho cả chuyến khác: ${otherTrips.map(e => `<b>${esc(e.routeCode)}${e.time ? " · " + esc(e.time) : ""}</b>`).join(", ")} — số khách/địa chỉ trên là tổng gộp, không riêng cho từng chuyến.</div>` : ""}
        ${g.savedAt ? `<div class="saved-at">Lưu lúc ${esc(g.savedAt)}</div>` : ""}
      </div>`;
    }).join("");

    return `<div class="trip-card ${isUnrouted ? "unrouted" : ""}" data-route="${esc(trip.routeCode)}">
      <div class="trip-head">
        <div class="trip-time num">${esc(trip.time) || "—"}</div>
        <div class="trip-route">
          <span class="code">${isUnrouted ? "Chưa gán tuyến" : esc(trip.routeCode)} ${trip.office ? `<span class="office-badge">${esc(trip.office)}</span>` : ""}</span>
          <span class="cities">${isUnrouted ? esc(trip.date) : `${routeLabel(trip.routeCode)} · ${esc(trip.date)}`}</span>
        </div>
        <div class="trip-meta">
          <div class="meta-item"><span class="v">${trip.groups.length}</span><span class="k">Nhóm / xe</span></div>
          <div class="meta-item"><span class="v">${totalPax}</span><span class="k">Khách</span></div>
        </div>
      </div>
      <div class="trip-body">${groupsHtml}</div>
    </div>`;
  }

  function applyFilters(records) {
    let out = records;
    if (activeOffice !== null) out = out.filter(r => r.office === activeOffice);
    if (activeRoute !== null) {
      out = out.filter(r => explodeRoutes(r).some(e => e.routeCode === activeRoute));
    }
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      out = out.filter(r =>
        (r.driverName || "").toLowerCase().includes(q) ||
        (r.bks || "").toLowerCase().includes(q) ||
        (r.phone || "").includes(q) ||
        (r.addresses || "").toLowerCase().includes(q)
      );
    }
    return out;
  }

  function render() {
    const filtered = applyFilters(allRecords);
    const trips = buildTripCards(filtered);
    const pickerLayout = el("pickerLayout");
    const emptyState = el("emptyState");

    if (!allRecords.length) {
      emptyState.hidden = false;
      pickerLayout.hidden = true;
      el("summaryStrip").hidden = true;
      return;
    }
    emptyState.hidden = true;
    pickerLayout.hidden = false;

    const picker = el("tripPicker");
    picker.innerHTML = trips.length
      ? trips.map(renderTripPickerRow).join("")
      : `<div class="empty" style="padding:28px 16px;"><p style="margin:0;">Không tìm thấy chuyến nào khớp bộ lọc.</p></div>`;
    picker.querySelectorAll(".trip-row").forEach(btn => btn.addEventListener("click", () => {
      selectedTripKey = selectedTripKey === btn.dataset.tripkey ? null : btn.dataset.tripkey;
      render();
    }));

    // Selected trip might have dropped out of the filtered set (search/filter changed, or
    // its data disappeared on refresh) — fall back to the placeholder rather than showing
    // stale detail for a trip no longer in view.
    const selectedTrip = trips.find(t => t.key === selectedTripKey);
    el("tripDetail").innerHTML = selectedTrip
      ? renderTripCard(selectedTrip)
      : `<div class="detail-placeholder" id="detailPlaceholder">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5"><path d="M9 18l6-6-6-6"/></svg>
          <p>Chọn 1 chuyến bên trái (giờ · tuyến) để xem chi tiết xe, tài xế, điểm đón.</p>
        </div>`;

    const totalPax = allRecords.reduce((s, r) => s + (parseInt(r.paxCount, 10) || 0), 0);
    const noVehicle = allRecords.filter(r => !r.bks && !r.driverName).length;
    const strip = el("summaryStrip");
    strip.hidden = false;
    strip.innerHTML = [
      [trips.length, "Chuyến"],
      [allRecords.length, "Nhóm / xe"],
      [totalPax, "Tổng khách"],
      [noVehicle, "Chưa gán xe"],
    ].map(([n, lbl]) => `<div class="summary-cell"><div class="n num">${n}</div><div class="lbl">${lbl}</div></div>`).join("");
  }

  function rebuildOfficeChips() {
    const offices = [...new Set(allRecords.map(r => r.office).filter(Boolean))].sort();
    const box = el("officeChips");
    if (offices.length < 2) { box.innerHTML = ""; return; } // only one office loaded — nothing to filter
    let html = `<button class="chip" data-office="__all__" aria-pressed="${activeOffice === null}">Tất cả khu vực</button>`;
    html += offices.map(o => `<button class="chip" data-office="${esc(o)}" aria-pressed="${activeOffice === o}">${esc(o)}</button>`).join("");
    box.innerHTML = html;
    box.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => {
      activeOffice = btn.dataset.office === "__all__" ? null : btn.dataset.office;
      rebuildOfficeChips();
      render();
    }));
  }

  function rebuildRouteChips() {
    const codes = new Set();
    let hasUnrouted = false;
    for (const r of allRecords) {
      for (const { routeCode } of explodeRoutes(r)) {
        if (routeCode) codes.add(routeCode); else hasUnrouted = true;
      }
    }
    const routes = [...codes].sort();
    const box = el("routeChips");
    if (!routes.length && !hasUnrouted) { box.innerHTML = ""; return; }
    let html = `<button class="chip" data-route="__all__" aria-pressed="${activeRoute === null}">Tất cả tuyến</button>`;
    html += routes.map(r => `<button class="chip" data-route="${esc(r)}" aria-pressed="${activeRoute === r}">${esc(r)}</button>`).join("");
    if (hasUnrouted) html += `<button class="chip" data-route="" aria-pressed="${activeRoute === ""}">Chưa gán tuyến</button>`;
    box.innerHTML = html;
    box.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => {
      activeRoute = btn.dataset.route === "__all__" ? null : btn.dataset.route;
      rebuildRouteChips();
      render();
    }));
  }

  function loadRecords(rawRecords, sourceLabel) {
    allRecords = dedupeRecords(rawRecords);
    rebuildOfficeChips();
    rebuildRouteChips();
    render();
    el("updatedFoot").textContent = `Cập nhật lúc ${new Date().toLocaleString("vi-VN")}${sourceLabel ? " · " + sourceLabel : ""}`;
  }

  function setStatus(msg, kind) {
    const s = el("statusLine");
    s.textContent = msg || "";
    s.className = "status-line" + (kind ? " " + kind : "");
  }

  // Hardcoded shortcuts to the 2 published "Chấm công {office}" CSV endpoints — this is
  // deliberately the ONLY data source (no file upload, no manual URL field) so booking
  // can't point the dashboard at an arbitrary/wrong source. Both load together into one
  // combined view (tagged per-record with `office`) instead of picking one at a time —
  // "Tất cả khu vực"/"Hà Nội"/"Sa Pa" chips below just filter what's already loaded.
  const SOURCES = [
    { label: "Hà Nội", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWPdOH0zyaDui2ojqiKglSFh11SFmjXB7bgLuq_iBFgIVfCYo_E623t5gCOWvRI8XJZkptUXfC4kdM/pub?gid=1506329944&single=true&output=csv" },
    { label: "Sa Pa", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbQCxhQENuXOifuaYTkhL3R7fZBYgCKz_YvzCgjr4CBIZe1TDhXtSyQHGMY5Ipp7nea921lUetGeLF/pub?gid=2032547328&single=true&output=csv" },
  ];

  let autoTimer = null;
  let autoInFlight = false;
  const AUTO_REFRESH_MS = 30000;

  // `background` = true for auto-refresh polls: on total failure, keep whatever is already
  // on screen instead of blanking the dashboard out from under whoever's looking at it —
  // just leave a quiet error note in the status line. A partial failure (one office loads,
  // the other doesn't) still shows the office that succeeded, with the failure noted.
  async function loadAllSources(background) {
    if (autoInFlight) return;
    autoInFlight = true;
    if (!background) setStatus("Đang tải…");
    try {
      const results = await Promise.allSettled(SOURCES.map(src =>
        fetch(src.url, { cache: "no-store" }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        }).then(text => rowsToRecords(parseCSV(text)).map(rec => ({ ...rec, office: src.label })))
      ));

      const merged = [];
      const errors = [];
      results.forEach((res, i) => {
        if (res.status === "fulfilled") merged.push(...res.value);
        else errors.push(`${SOURCES[i].label}: ${res.reason.message || res.reason}`);
      });

      if (!merged.length) {
        setStatus((background ? "Tự động cập nhật lỗi (vẫn giữ bảng cũ): " : "Không tải được dữ liệu: ") + (errors.join("; ") || "không có dòng nào"), "err");
        return;
      }

      loadRecords(merged, "Hà Nội & Sa Pa");
      const okMsg = `Đã tải ${merged.length} dòng (${allRecords.length} nhóm sau khi gộp trùng).`;
      setStatus(errors.length ? `${okMsg} Lỗi: ${errors.join("; ")}` : okMsg, errors.length ? "err" : "ok");
      el("autoRefreshWrap").hidden = false;
      if (!autoTimer) startAutoRefresh();
    } finally {
      autoInFlight = false;
    }
  }

  function updateLiveDot() {
    el("liveDot").classList.toggle("live", !!autoTimer);
  }

  function stopAutoRefresh() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    updateLiveDot();
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    if (!el("autoRefreshToggle").checked) { updateLiveDot(); return; }
    autoTimer = setInterval(() => { if (!document.hidden) loadAllSources(true); }, AUTO_REFRESH_MS);
    updateLiveDot();
  }

  // ---------- Wiring ----------
  el("btnRefresh").addEventListener("click", () => loadAllSources());
  el("autoRefreshToggle").addEventListener("change", () => { if (el("autoRefreshToggle").checked) startAutoRefresh(); else stopAutoRefresh(); });
  // Coming back to the tab after it was backgrounded: catch up immediately instead of
  // waiting out the rest of the interval, since the last poll(s) were skipped while hidden.
  document.addEventListener("visibilitychange", () => { if (!document.hidden && autoTimer) loadAllSources(true); });

  el("searchInput").addEventListener("input", e => { searchTerm = e.target.value.trim(); render(); });

  loadAllSources(); // auto-load both offices on open — no manual "chọn khu vực" step
  render();
})();
</script>
